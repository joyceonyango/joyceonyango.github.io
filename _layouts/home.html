---
layout: default
---
<style>
  @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.4;} }
  .hero { padding: 72px 0 48px; border-bottom: 1px solid var(--border); animation: fadeUp 0.55s ease both; }
  .hero-eyebrow { display: inline-flex; align-items: center; gap: 8px; font-size: 0.72rem; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: var(--accent-light); margin-bottom: 20px; }
  .hero-eyebrow .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent-light); animation: pulse 2s infinite; }
  .hero h1 { font-family: var(--font-serif); font-size: clamp(2rem, 5vw, 2.8rem); font-weight: 700; color: var(--text-bright); line-height: 1.2; margin-bottom: 16px; }
  .hero h1 em { font-style: italic; color: var(--accent-light); }
  .hero-desc { font-size: 1rem; color: var(--text-muted); line-height: 1.8; max-width: 540px; margin-bottom: 32px; }
  .hero-ctas { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 40px; }
  .btn-primary { display: inline-flex; align-items: center; gap: 7px; background: var(--accent); color: #fff; font-size: 0.85rem; font-weight: 600; padding: 10px 22px; border-radius: 6px; border: 1px solid var(--accent); transition: background 0.18s, transform 0.18s; }
  .btn-primary:hover { background: var(--accent-light); color: var(--bg); transform: translateY(-1px); }
  .btn-outline { display: inline-flex; align-items: center; gap: 7px; background: transparent; color: var(--text-muted); font-size: 0.85rem; font-weight: 500; padding: 10px 22px; border-radius: 6px; border: 1px solid var(--border); transition: border-color 0.18s, color 0.18s; }
  .btn-outline:hover { border-color: var(--accent-light); color: var(--accent-light); }
  .hero-meta { display: flex; gap: 24px; flex-wrap: wrap; }
  .meta-item { display: flex; align-items: center; gap: 8px; font-size: 0.82rem; color: var(--text-dim); }
  .meta-icon { width: 26px; height: 26px; background: var(--surface-3); border-radius: 5px; display: flex; align-items: center; justify-content: center; font-size: 12px; }
  .insights-list { list-style: none; }
  .insights-list li { display: flex; align-items: baseline; gap: 12px; padding: 14px 0; border-bottom: 1px solid var(--border); font-size: 0.92rem; color: var(--text-muted); line-height: 1.65; }
  .insights-list li:last-child { border-bottom: none; }
  .insights-list li::before { display: none; }
  .insight-icon { display: flex; align-items: center; justify-content: center; width: 28px; height: 28px; min-width: 28px; background: var(--surface-3); border: 1px solid var(--border); border-radius: 7px; color: var(--accent-light); }
  .insights-list a { color: var(--accent-light); }
  .quote-block { background: var(--surface-2); border-left: 3px solid var(--accent-light); border-radius: 0 8px 8px 0; padding: 20px 24px; margin-top: 28px; }
  .quote-block blockquote { font-family: var(--font-serif); font-style: italic; font-size: 1rem; color: var(--text-muted); line-height: 1.7; }
  .quote-block cite { display: block; margin-top: 10px; font-size: 0.75rem; color: var(--text-dim); font-style: normal; }
  .drives-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  @media (max-width: 520px) { .drives-grid { grid-template-columns: 1fr; } }
  .drive-card { background: var(--surface-2); border: 1px solid var(--border); border-radius: 8px; padding: 18px 20px; transition: border-color 0.18s, transform 0.18s; }
  .drive-card:hover { border-color: var(--accent); transform: translateY(-2px); }
  .drive-card h4 { font-size: 0.82rem; font-weight: 600; color: var(--text-bright); margin-bottom: 6px; display: flex; align-items: center; gap: 8px; }
  .drive-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent-light); flex-shrink: 0; }
  .drive-card p { font-size: 0.84rem; color: var(--text-dim); line-height: 1.65; }
  .snap-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  @media (max-width: 520px) { .snap-grid { grid-template-columns: 1fr; } }
  .snap-card { background: var(--surface-2); border: 1px solid var(--border); border-radius: 8px; padding: 20px; display: block; transition: border-color 0.18s, transform 0.18s; }
  .snap-card:hover { border-color: var(--accent-light); transform: translateY(-2px); }
  .snap-label { font-size: 0.7rem; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent-light); margin-bottom: 8px; }
  .snap-title { font-size: 0.9rem; font-weight: 600; color: var(--text-bright); margin-bottom: 6px; }
  .snap-desc { font-size: 0.8rem; color: var(--text-dim); line-height: 1.55; }
  .snap-arrow { display: inline-block; margin-top: 12px; font-size: 0.78rem; color: var(--accent-light); }

  /* Tech stack pills */
  .stack-pills-home { display: flex; flex-wrap: wrap; gap: 8px; }
  .home-pill { display: inline-flex; align-items: center; gap: 7px; font-size: 0.79rem; font-weight: 500; color: var(--text-muted); background: var(--surface-2); border: 1px solid var(--border); padding: 6px 13px; border-radius: 20px; transition: border-color 0.15s, color 0.15s; }
  .home-pill:hover { border-color: var(--accent-light); color: var(--accent-light); }
  .home-pill svg { flex-shrink: 0; }

  /* Explore card images */
  .snap-img { width: 100%; height: 90px; border-radius: 6px; margin-bottom: 14px; display: flex; align-items: center; justify-content: center; }
  .snap-img--profile { background: linear-gradient(135deg, #1a3a2a 0%, #2d9456 100%); color: rgba(255,255,255,0.85); }
  .snap-img--career  { background: linear-gradient(135deg, #1a2a3a 0%, #2d5694 100%); color: rgba(255,255,255,0.85); }
  .snap-img--portfolio { background: linear-gradient(135deg, #2a1a3a 0%, #7c3dba 100%); color: rgba(255,255,255,0.85); }
  .snap-card:hover .snap-img { opacity: 0.92; }

</style>
{{ content }}
