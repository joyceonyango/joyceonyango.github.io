---
layout: default
---
<style>
  .profile-block { display: flex; gap: 24px; align-items: flex-start; padding: 32px 0 0; animation: fadeUp 0.45s ease both; }
  .avatar { width: 80px; height: 80px; border-radius: 50%; background: var(--surface-3); border: 2px solid var(--border-light); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 2.2rem; }
  .profile-text h1 { font-family: var(--font-serif); font-size: 1.5rem; font-weight: 700; color: var(--text-bright); margin-bottom: 4px; }
  .profile-text .role { font-size: 0.83rem; color: var(--accent-light); font-weight: 500; margin-bottom: 12px; }
  .profile-text p { font-size: 0.92rem; color: var(--text-muted); line-height: 1.75; }
  .social-row { display: flex; gap: 10px; margin-top: 16px; flex-wrap: wrap; }
  .social-btn { display: inline-flex; align-items: center; gap: 7px; font-size: 0.79rem; font-weight: 500; color: var(--text-dim); border: 1px solid var(--border); background: var(--surface-2); padding: 6px 14px; border-radius: 20px; transition: border-color 0.15s, color 0.15s; }
  .social-btn:hover { border-color: var(--accent-light); color: var(--accent-light); }
  .social-btn svg { flex-shrink: 0; }
  @media (max-width: 500px) { .profile-block { flex-direction: column; } }
  .bio p { font-size: 0.93rem; color: var(--text-muted); line-height: 1.85; margin-bottom: 16px; }
  .bio p:last-child { margin-bottom: 0; }
  .traits-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  @media (max-width: 500px) { .traits-grid { grid-template-columns: 1fr; } }
  .trait-card { background: var(--surface-2); border: 1px solid var(--border); border-radius: 8px; padding: 18px 20px; transition: border-color 0.18s, transform 0.18s; }
  .trait-card:hover { border-color: var(--accent); transform: translateY(-2px); }
  .trait-icon { font-size: 1.4rem; margin-bottom: 10px; display: block; }
  .trait-card h4 { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent-light); margin-bottom: 6px; }
  .trait-card p { font-size: 0.84rem; color: var(--text-dim); line-height: 1.6; }
  .quote-block { background: var(--surface-2); border-left: 3px solid var(--accent-light); border-radius: 0 8px 8px 0; padding: 20px 24px; }
  .quote-block blockquote { font-family: var(--font-serif); font-style: italic; font-size: 1rem; color: var(--text-muted); line-height: 1.75; }
  .quote-block cite { display: block; margin-top: 10px; font-size: 0.75rem; color: var(--text-dim); font-style: normal; }
  .edu-item { padding: 16px 0; border-bottom: 1px solid var(--border); display: grid; grid-template-columns: 1fr auto; gap: 4px 16px; }
  .edu-item:last-child { border-bottom: none; }
  .edu-degree { font-size: 0.92rem; font-weight: 600; color: var(--text-bright); }
  .edu-institution { font-size: 0.83rem; color: var(--accent-light); margin-top: 2px; }
  .edu-desc { font-size: 0.84rem; color: var(--text-dim); line-height: 1.6; margin-top: 6px; grid-column: 1 / -1; }
  .edu-year { font-size: 0.77rem; color: var(--text-dim); text-align: right; white-space: nowrap; padding-top: 3px; }
  .stack-groups { display: flex; flex-direction: column; gap: 22px; }
  .stack-group h4 { font-size: 0.7rem; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 10px; }
  .pill-row { display: flex; flex-wrap: wrap; gap: 7px; }
  .pill { font-size: 0.8rem; background: var(--surface-3); color: var(--text-muted); border: 1px solid var(--border); border-radius: 5px; padding: 5px 12px; transition: border-color 0.15s, color 0.15s; display: inline-flex; align-items: center; gap: 6px; }
  .pill:hover { border-color: var(--accent); color: var(--accent-light); }
  .pill svg { flex-shrink: 0; }
  .pill-badge { height: 18px; width: auto; display: block; border-radius: 3px; }
</style>
{{ content }}
