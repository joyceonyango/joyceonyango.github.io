---
layout: default
---
<style>
  .timeline { display: flex; flex-direction: column; gap: 0; width: 100%; }
  .tl-item { display: grid; grid-template-columns: 20px 1fr; gap: 0 20px; padding-bottom: 36px; position: relative; min-width: 0; width: 100%; }
  .tl-item:last-child { padding-bottom: 0; }
  .tl-left { display: flex; flex-direction: column; align-items: center; }
  .tl-dot { width: 12px; height: 12px; border-radius: 50%; background: var(--accent); border: 2px solid var(--bg); box-shadow: 0 0 0 2px var(--accent); flex-shrink: 0; margin-top: 6px; }
  .tl-line { flex: 1; width: 2px; background: var(--border); margin-top: 6px; }
  .tl-item:last-child .tl-line { display: none; }
  .tl-card { background: var(--surface-2); border: 1px solid var(--border); border-radius: 10px; padding: 20px 24px; transition: border-color 0.18s; min-width: 0; width: 100%; overflow: hidden; box-sizing: border-box; }
  .tl-card:hover { border-color: var(--border-light); }
  .tl-meta { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; margin-bottom: 6px; flex-wrap: wrap; }
  .tl-org { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent-light); }
  .tl-duration { font-size: 0.75rem; color: var(--text-dim); }
  .tl-role { font-size: 1rem; font-weight: 600; color: var(--text-bright); margin-bottom: 10px; font-family: var(--font-serif); }
  .tl-desc { font-size: 0.88rem; color: var(--text-muted); line-height: 1.75; margin-bottom: 14px; }
  .tl-tags { display: flex; flex-wrap: wrap; gap: 6px; }
  .tl-tag { font-size: 0.74rem; background: var(--surface-3); color: var(--text-dim); border: 1px solid var(--border); border-radius: 4px; padding: 2px 9px; display: inline-flex; align-items: center; gap: 5px; }
  .research-card { background: var(--surface-2); border: 1px solid var(--accent-dark); border-radius: 10px; padding: 24px; }
  .research-card h3 { font-family: var(--font-serif); font-size: 1rem; font-weight: 700; color: var(--text-bright); margin-bottom: 12px; }
  .research-card p { font-size: 0.88rem; color: var(--text-muted); line-height: 1.78; margin-bottom: 12px; }
  .research-card p:last-child { margin-bottom: 0; }
  .skills-list { display: flex; flex-direction: column; gap: 14px; }
  .skill-row { display: grid; grid-template-columns: 140px 1fr auto; align-items: center; gap: 14px; }
  @media (max-width: 500px) { .skill-row { grid-template-columns: 1fr auto; } .skill-row .skill-track { grid-column: 1 / -1; } }
  .skill-label { font-size: 0.82rem; color: var(--text-muted); display: inline-flex; align-items: center; gap: 6px; }
  .skill-track { height: 5px; background: var(--surface-3); border-radius: 4px; overflow: hidden; }
  .skill-bar-fill { height: 100%; background: linear-gradient(90deg, var(--accent-dark), var(--accent-light)); border-radius: 4px; }
  .skill-pct { font-size: 0.75rem; color: var(--text-dim); }

  /* ── Bullet fix: hanging indent, no extra markup needed ── */
  .tl-bullets { list-style: none; margin: 0 0 14px; padding: 0; display: flex; flex-direction: column; gap: 7px; }
  .tl-bullets li { font-size: 0.87rem; color: var(--text-muted); line-height: 1.7; padding-left: 1.2em; text-indent: -1.2em; }
  .tl-bullets li::before { content: "▸ "; color: var(--terra); font-size: 0.7rem; }
</style>
{{ content }}
