---
layout: default
---
<style>
  .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  @media (max-width: 480px) { .stats-row { grid-template-columns: 1fr; } }
  .stat-card { background: var(--surface-2); border: 1px solid var(--border); border-radius: 8px; padding: 20px; text-align: center; }
  .stat-number { font-family: var(--font-serif); font-size: 2rem; font-weight: 700; color: var(--accent-light); display: block; }
  .stat-label { font-size: 0.78rem; color: var(--text-dim); margin-top: 4px; }
  .projects-list { display: flex; flex-direction: column; gap: 20px; }
  .project-card { background: var(--surface-2); border: 1px solid var(--border); border-radius: 10px; padding: 24px; transition: border-color 0.18s, transform 0.18s; }
  .project-card:hover { border-color: var(--border-light); transform: translateY(-2px); }
  .project-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 10px; }
  .project-name { font-family: var(--font-serif); font-size: 1rem; font-weight: 700; color: var(--text-bright); }
  .project-link { font-size: 0.78rem; color: var(--accent-light); border: 1px solid var(--accent-dark); border-radius: 4px; padding: 3px 10px; white-space: nowrap; transition: background 0.15s; }
  .project-link:hover { background: var(--accent-pale); }
  .project-findings { font-size: 0.88rem; color: var(--text-muted); line-height: 1.75; margin-bottom: 14px; }
  .project-tags { display: flex; flex-wrap: wrap; gap: 6px; }
  .project-tag { font-size: 0.74rem; background: var(--surface-3); color: var(--text-dim); border: 1px solid var(--border); border-radius: 4px; padding: 2px 9px; }
  .project-details { display: none; margin: 16px 0 0; padding: 16px 0 0; border-top: 1px solid var(--border); }
  .project-details h4 { font-size: 0.78rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent-light); margin: 16px 0 6px; }
  .project-details h4:first-child { margin-top: 0; }
  .project-details p { font-size: 0.87rem; color: var(--text-muted); line-height: 1.75; margin-bottom: 10px; }
  .findings-table { width: 100%; border-collapse: collapse; font-size: 0.83rem; margin: 10px 0 14px; }
  .findings-table th { text-align: left; padding: 8px 12px; background: var(--surface-3); color: var(--text-bright); font-weight: 600; font-size: 0.76rem; letter-spacing: 0.05em; border-bottom: 1px solid var(--border); }
  .findings-table td { padding: 8px 12px; color: var(--text-muted); border-bottom: 1px solid var(--border); }
  .findings-table tr:last-child td { border-bottom: none; }
  .findings-table tr:hover td { background: var(--surface-2); }
  .details-toggle { margin-top: 14px; background: none; border: 1px solid var(--border); color: var(--accent-light); font-size: 0.78rem; font-weight: 600; padding: 5px 14px; border-radius: 5px; cursor: pointer; transition: border-color 0.15s, background 0.15s; }
  .details-toggle:hover { border-color: var(--accent-light); background: var(--accent-pale); }
  .github-cta { display: flex; justify-content: center; padding-top: 8px; }
  .github-btn { display: inline-flex; align-items: center; gap: 10px; background: var(--surface-2); border: 1px solid var(--border); color: var(--text-muted); font-size: 0.88rem; font-weight: 600; padding: 12px 28px; border-radius: 8px; transition: border-color 0.18s, color 0.18s, transform 0.18s, background 0.18s; }
  .github-btn:hover { border-color: var(--accent-light); color: var(--accent-light); background: var(--accent-pale); transform: translateY(-2px); }
  .project-github-btn { display: inline-flex; align-items: center; gap: 7px; margin-top: 10px; font-size: 0.79rem; font-weight: 600; color: var(--text-dim); border: 1px solid var(--border); background: var(--surface-3); padding: 5px 14px; border-radius: 5px; transition: border-color 0.15s, color 0.15s, background 0.15s; }
  .project-github-btn:hover { border-color: var(--accent-light); color: var(--accent-light); background: var(--accent-pale); }
  .project-banner { margin: -24px -24px 18px -24px; border-radius: 10px 10px 0 0; overflow: hidden; height: 160px; }
  .project-banner img { width: 100%; height: 100%; object-fit: cover; display: block; }
</style>
<script>
  function toggleDetails(id, btn) {
    var el = document.getElementById(id);
    if (!el) return;
    var open = el.style.display === "block";
    el.style.display = open ? "none" : "block";
    btn.setAttribute("aria-expanded", open ? "false" : "true");
    btn.innerHTML = open ? "View Details &#9662;" : "Hide Details &#9652;";
  }
</script>
{{ content }}
