---
layout: default
---

<style>
/* ── Page hero ─────────────────────────────────────────── */
.page-hero {
  padding: 3.5rem 0 2rem;
  text-align: center;
}
.page-hero .eyebrow {
  display: inline-block;
  font-family: var(--font-sans);
  font-size: 0.75rem;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 0.75rem;
}
.page-hero h1 {
  font-family: var(--font-serif);
  font-size: clamp(2rem, 5vw, 3rem);
  color: var(--text-bright);
  margin: 0 0 0.75rem;
}
.page-hero p {
  font-family: var(--font-sans);
  font-size: 1rem;
  color: var(--text-muted);
  max-width: 560px;
  margin: 0 auto;
  line-height: 1.7;
}

/* ── Stats row ─────────────────────────────────────────── */
.stats-row {
  display: flex;
  gap: 1rem;
  justify-content: center;
  flex-wrap: wrap;
  margin: 2rem 0 1.5rem;
}
.stat-card {
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.75rem;
  text-align: center;
  min-width: 120px;
}
.stat-number {
  display: block;
  font-family: var(--font-serif);
  font-size: 1.75rem;
  font-weight: 700;
  color: var(--terra);
  line-height: 1;
}
.stat-label {
  font-family: var(--font-sans);
  font-size: 0.75rem;
  color: var(--text-muted);
  margin-top: 0.35rem;
}

/* ── GitHub CTA ────────────────────────────────────────── */
.github-cta { text-align: center; margin-bottom: 2.5rem; }
.github-btn {
  display: inline-flex;
  align-items: center;
  gap: 0.4rem;
  font-family: var(--font-sans);
  font-size: 0.78rem;
  font-weight: 600;
  color: var(--text-bright);
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 0.45rem 0.9rem;
  text-decoration: none;
  transition: border-color 0.2s, color 0.2s;
}
.github-btn:hover { border-color: var(--accent); color: var(--accent); }

/* ── Section header ────────────────────────────────────── */
.section-header { margin-bottom: 1.75rem; }
.section-title {
  font-family: var(--font-serif);
  font-size: 1.5rem;
  color: var(--text-bright);
  margin: 0 0 0.25rem;
}
.section-sub {
  font-family: var(--font-sans);
  font-size: 0.875rem;
  color: var(--text-muted);
  margin: 0;
}

/* ── Projects grid ─────────────────────────────────────── */
.projects-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 1.5rem;
  align-items: stretch;
}

/* ── Project card ──────────────────────────────────────── */
.project-card {
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: 16px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  height: 100%;
  transition: transform 0.2s ease, box-shadow 0.2s ease;
}
.project-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 16px 40px rgba(0,0,0,0.25);
}

/* ── Image banner ──────────────────────────────────────── */
.project-banner {
  width: 100%;
  height: 240px;
  overflow: hidden;
  position: relative;
  flex-shrink: 0;
}
.project-banner img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center;
  display: block;
  transition: transform 0.4s ease;
}
.project-card:hover .project-banner img {
  transform: scale(1.04);
}

/* ── Floating badge on image ───────────────────────────── */
.card-type-badge {
  position: absolute;
  top: 14px;
  left: 14px;
  display: inline-flex;
  align-items: center;
  gap: 0.35rem;
  background: rgba(16, 12, 13, 0.78);
  border: 1px solid rgba(255,255,255,0.10);
  border-radius: 20px;
  padding: 0.3rem 0.85rem;
  font-family: var(--font-sans);
  font-size: 0.72rem;
  font-weight: 700;
  color: var(--terra-light);
  backdrop-filter: blur(8px);
  letter-spacing: 0.03em;
}

/* ── No-photo banner ───────────────────────────────────── */
.project-banner.no-photo {
  background: linear-gradient(135deg, var(--surface-3) 0%, var(--surface-2) 100%);
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ── Card body ─────────────────────────────────────────── */
.card-body {
  padding: 1.25rem 1.4rem 1.4rem;
  display: flex;
  flex-direction: column;
  flex: 1;
  gap: 0.75rem;
}

/* ── Tags row (below image, above title) ───────────────── */
.project-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 0.4rem;
}
.project-tag {
  font-family: var(--font-sans);
  font-size: 0.72rem;
  font-weight: 600;
  color: var(--accent-light);
  background: var(--accent-pale);
  border: 1px solid rgba(1,92,71,0.25);
  border-radius: 20px;
  padding: 0.2rem 0.65rem;
}

/* ── Title ─────────────────────────────────────────────── */
.project-name {
  font-family: var(--font-sans);
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--text-bright);
  line-height: 1.35;
}

/* ── Description ───────────────────────────────────────── */
.project-findings {
  font-family: var(--font-sans);
  font-size: 0.875rem;
  color: var(--text-muted);
  line-height: 1.65;
  margin: 0;
  flex: 1;
}

/* ── Expandable details ────────────────────────────────── */
.project-details {
  display: none;
  font-family: var(--font-sans);
  font-size: 0.85rem;
  color: var(--text-body);
  line-height: 1.7;
  border-top: 1px solid var(--border);
  padding-top: 1rem;
  margin-bottom: 1rem;
}
.project-details h4 {
  font-size: 0.78rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-muted);
  margin: 0.75rem 0 0.35rem;
}
.project-details h4:first-child { margin-top: 0; }
.project-details p { margin: 0 0 0.5rem; }
.project-details.open { display: block; }

/* ── Findings table ────────────────────────────────────── */
.findings-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.8rem;
  margin: 0.5rem 0 1rem;
}
.findings-table th {
  background: var(--surface-3);
  color: var(--text-muted);
  font-weight: 600;
  text-align: left;
  padding: 0.4rem 0.75rem;
}
.findings-table td {
  padding: 0.35rem 0.75rem;
  border-bottom: 1px solid var(--border);
  color: var(--text-body);
}

/* ── View Project button ───────────────────────────────── */
.view-project-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.4rem;
  width: 100%;
  padding: 0.5rem 0.85rem;
  background: transparent;
  border: 1px solid var(--border-light);
  border-radius: 8px;
  font-family: var(--font-sans);
  font-size: 0.78rem;
  font-weight: 600;
  color: var(--text-bright);
  text-decoration: none;
  transition: background 0.2s, border-color 0.2s;
  margin-top: auto;
}
.view-project-btn:hover {
  background: var(--accent-pale);
  border-color: var(--accent);
  color: var(--accent-light);
}

/* ── Details toggle ────────────────────────────────────── */
.details-toggle {
  display: inline-flex;
  align-items: center;
  gap: 0.35rem;
  background: none;
  border: none;
  font-family: var(--font-sans);
  font-size: 0.72rem;
  font-weight: 700;
  color: var(--terra);
  cursor: pointer;
  padding: 0;
}
.details-toggle:hover { color: var(--terra-light); }

/* ── MSc thesis — full width spanning both columns ─────── */
.project-card.full-span {
  grid-column: 1 / -1;
}
.project-card.full-span .project-banner {
  height: 200px;
}
.project-card.full-span .project-findings {
  -webkit-line-clamp: 2;
}

/* ── Responsive ────────────────────────────────────────── */
@media (max-width: 640px) {
  .projects-grid { grid-template-columns: 1fr; }
  .project-card.full-span { grid-column: 1; }
  .project-banner { height: 200px; }
}
</style>

<script>
function toggleDetails(id, btn) {
  const el = document.getElementById(id);
  const open = el.classList.toggle('open');
  btn.setAttribute('aria-expanded', open);
  btn.innerHTML = open ? 'Hide Details ▲' : 'View Details ▼';
  const desc = btn.closest('.card-body').querySelector('.project-findings');
  if (desc) desc.style.webkitLineClamp = open ? 'unset' : '3';
}
</script>
