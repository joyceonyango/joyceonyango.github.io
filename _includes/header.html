<nav class="frozen">
  <div class="nav-inner">
    <div class="desktop-nav" style="display:flex;list-style:none;gap:2px;align-items:center;">
      {% for item in site.data.nav %}
      <a href="{{ item.url }}"
         style="font-size:0.82rem;font-weight:500;color:var(--text-dim);padding:5px 11px;border-radius:5px;transition:color 0.15s,background 0.15s;"
         onmouseover="this.style.color='var(--text-bright)';this.style.background='var(--surface-3)'"
         onmouseout="this.style.color='var(--text-dim)';this.style.background='transparent'">{{ item.title }}</a>
      {% endfor %}
    </div>
    <div class="nav-right">
      <button class="theme-toggle" id="dark-toggle" aria-label="Toggle dark mode"
        style="background:none;border:1px solid var(--border);color:var(--text-dim);padding:5px 8px;border-radius:6px;cursor:pointer;display:flex;align-items:center;transition:border-color 0.15s,color 0.15s;">
        <svg id="moon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" width="18" height="18">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
        </svg>
        <svg id="sun" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" width="18" height="18" style="display:none">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
        </svg>
      </button>
    </div>
  </div>
</nav>
