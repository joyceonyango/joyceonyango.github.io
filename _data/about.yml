# ── My Profile ────────────────────────────────────────────────
profile:
  heading: My Profile
  subtext: Where spatial thinking meets real-world impact
  intro: >
    I'm driven by the intersection of spatial analysis, machine learning, and applied
    research — from automated GIS pipelines to deep learning models that assess walkability
    from street-level imagery. Through my internships and MSc research in Tshwane, I've
    seen firsthand how spatial data surfaces patterns invisible to the naked eye and
    translates them into evidence that moves policy, planning, and investment.

  traits:
    heading: Who I Am
    items:
      - icon: "🗺️"
        title: Spatial Thinker
        text: Skilled in GIS, remote sensing, and spatial analysis. I use maps to reveal patterns, risks, and opportunities invisible in raw data.
      - icon: "🔬"
        title: Research-Driven
        text: My MSc research applies deep learning and computer vision to urban walkability, bridging academic rigour and real-world impact.
      - icon: "⚙️"
        title: Data Engineer
        text: Committed to end-to-end geospatial pipelines — from raw satellite and street-level imagery to clean, production-ready spatial outputs.
      - icon: "🌍"
        title: Globally Minded
        text: Adaptable across African and global contexts, with professional experience in Kenya, South Africa, and remote-first environments.

  drives:
    heading: What Drives Me
    items:
      - label: Evidence-based analysis
        text: I ground every map, model, and recommendation in real spatial data — from fieldwork to Google Earth Engine.
      - label: Accessible science
        text: Geospatial insight should reach communities, not just technical audiences. I design outputs non-specialists can act on.
      - label: Continuous learning
        text: From PyTorch scene classifiers to PostGIS spatial queries, I actively seek tools that deepen my capabilities.
      - label: Cross-sector impact
        text: "Conservation, urban planning, agriculture, infrastructure — spatial data is universal, and I thrive at the intersection."

  quote:
    text: "The goal is to turn data into information, and information into insight."
    author: Carly Fiorina

