# ── About Me ──────────────────────────────────────────────────
about:
  heading: About Me
  subtext: A bit about who I am
  bio:
    - >
      Geospatial Data Scientist, completing my MSc in Geoinformatics at the University
      of Pretoria. I build pipelines and models in Python, ArcGIS, and QGIS. My work
      follows a simple path: raw spatial data → automated analysis → real-world decisions.
    - >
      I have worked across conservation, infrastructure, and urban planning — or anywhere
      spatial data can sharpen how decisions get made. Open to geospatial data science,
      GIS development, and spatial analyst roles whether full-time, graduate, or internship.

insights:
